AWSTemplateFormatVersion: '2010-09-09'
Description: DynamoDB table for testing CFN extractor

Parameters:
  TableName:
    Type: String
    Default: TestTable
    Description: Name of the DynamoDB table
  
  Environment:
    Type: String
    AllowedValues:
      - dev
      - staging
      - prod
    Default: dev

Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${TableName}-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
        - AttributeName: gsi1pk
          AttributeType: S
        - AttributeName: gsi1sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: gsi1pk
              KeyType: HASH
            - AttributeName: gsi1sk
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TestApp

Outputs:
  TableArn:
    Description: ARN of the DynamoDB table
    Value: !GetAtt UsersTable.Arn
    Export:
      Name: !Sub ${AWS::StackName}-TableArn
  
  TableName:
    Description: Name of the DynamoDB table
    Value: !Ref UsersTable


