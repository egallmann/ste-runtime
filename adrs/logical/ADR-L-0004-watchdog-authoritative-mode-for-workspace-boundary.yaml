decisions:
- id: DEC-0001
  summary: 'ste-runtime is a single process that combines:'
  rationale: "### The Watchdog IS the Conflict Resolution Process\n\nWhen a file moves:\n\
    1. Watchdog detects the move (authoritative: it observed the file system event)\n\
    2. Migration detection scores confidence (1.0 = certain same element)\n3. High\
    \ confidence вҶ’ Watchdog resolves automatically (correct resolution)\n4. Low confidence\
    \ вҶ’ Surfaces to human (ambiguous, needs judgment)\n\nThis is correct because:\n\
    -  Watchdog has ground truth (observed actual file system changes)\n-  Migration\
    \ detection is deterministic (same inputs вҶ’ same decision)\n-  Confidence thresholds\
    \ ensure safety (humans review ambiguous cases)\n-  Developer opts in (explicit\
    \ choice to delegate authority)\n\n### Slice Files Are Derived Artifacts\n\n```\n\
    Source of Truth:\n  user-panel.component.ts (source code)\n  \nDerived Artifact:\n\
    \  .ste/state/frontend/component/component-abc123.yaml (slice)\n  \nRelationship:\n\
    \  Source вҶ’ RECON вҶ’ Slice (one-way)\n```\n\n**Like:** `src/app.ts` вҶ’ `dist/app.js`\
    \ (compiled)\n\nIf you manually edit `dist/app.js`, the compiler overwrites it\
    \ on next build.  \nIf you manually edit a slice file, watchdog overwrites it\
    \ on next RECON (self-healing).\n\n---"
