context: "Per STE Architecture (Section 3.1), STE operates across two distinct governance\
  \ boundaries:\n1. **Workspace Development Boundary** - Provisional state, soft +\
  \ hard enforcement, post-reasoning validation\n2. **Runtime Execution Boundary**\
  \ - Canonical state, cryptographic enforcement, pre-reasoning admission control\n\
  \nThis E-ADR defines ste-runtime's operation within the **Workspace Development\
  \ Boundary**, where developers need a **live semantic graph** that stays fresh automatically\
  \ during local development.\n\n### Workspace Development Boundary (STE Architecture\
  \ Section 3.1)\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\n\
  в”Ӯ              WORKSPACE DEVELOPMENT BOUNDARY                     в”Ӯ\nв”Ӯ         \
  \                                                        в”Ӯ\nв”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\
  \   в”Ӯ\nв”Ӯ   в”Ӯ                    CURSOR (Governed)                    в”Ӯ   в”Ӯ\nв”Ӯ  \
  \ в”Ӯ  вҖў MCP client                                           в”Ӯ   в”Ӯ\nв”Ӯ   в”Ӯ  вҖў Context\
  \ assembly via RSS (ste-runtime MCP)           в”Ӯ   в”Ӯ\nв”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\
  \   в”Ӯ\nв”Ӯ                        в”Ӯ MCP Protocol (stdio)                   в”Ӯ\nв”Ӯ  \
  \                      в–ј                                        в”Ӯ\nв”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\
  \   в”Ӯ\nв”Ӯ   в”Ӯ              ste-runtime MCP Server                     в”Ӯ   в”Ӯ\nв”Ӯ  \
  \ в”Ӯ  вҖў File Watcher вҶ’ Incremental RECON                     в”Ӯ   в”Ӯ\nв”Ӯ   в”Ӯ  вҖў In-Memory\
  \ RSS Context                                в”Ӯ   в”Ӯ\nв”Ӯ   в”Ӯ  вҖў MCP Tools (RSS operations)\
  \                           в”Ӯ   в”Ӯ\nв”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\
  \   в”Ӯ\nв”Ӯ                        в”Ӯ                                        в”Ӯ\nв”Ӯ  \
  \                      в–ј                                        в”Ӯ\nв”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\
  \   в”Ӯ\nв”Ӯ   в”Ӯ              .ste/state/ (AI-DOC)                       в”Ӯ   в”Ӯ\nв”Ӯ  \
  \ в”Ӯ  вҖў Provisional state (pre-merge)                        в”Ӯ   в”Ӯ\nв”Ӯ   в”Ӯ  вҖў Updated\
  \ by incremental RECON                         в”Ӯ   в”Ӯ\nв”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\
  \   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\
  \n**State Type:** Provisional, experimental (uncommitted, feature branches)  \n\
  **Authority:** Source code is truth вҶ’ RECON extracts вҶ’ AI-DOC (local, pre-merge)\
  \  \n**Enforcement:** Soft (LLM) + Hard (validation tools + human approval)  \n\
  **Validation:** Post-reasoning (toolchain catches violations)\n\n---"
