context: 'The STE Architecture Specification defines RECON (Reconciliation Engine)
  as the mechanism for extracting semantic state from source code and populating AI-DOC.
  The question arose: How should RECON operate during the exploratory development
  phase when foundational components are still being built?


  Key tensions:


  1. **Canonical vs. Provisional State:** Should RECON produce canonical state that
  is authoritative for downstream systems?

  2. **Automatic Resolution vs. Conflict Surfacing:** Should RECON automatically resolve
  conflicts or surface them for human judgment?

  3. **Blocking vs. Non-Blocking:** Should RECON block development workflows when
  conflicts are detected?

  4. **Single Repository vs. Multi-Repository:** What is the scope of RECON''s reconciliation?


  ---'
