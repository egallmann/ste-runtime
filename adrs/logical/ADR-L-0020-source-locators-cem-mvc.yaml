schema_version: '1.0'
adr_type: logical
id: ADR-L-0020
title: Source Locators as Cognitive Execution Model Infrastructure
status: proposed
created_date: '2026-05-27'
authors:
- erik.gallmann
domains:
- workspace
- graph
- cem
