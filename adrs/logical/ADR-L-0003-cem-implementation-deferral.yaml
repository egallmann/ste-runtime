context: 'The STE Architecture Specification (ste-spec) defines a 9-stage Cognitive
  Execution Model (CEM):


  ```

  Perception → Orientation → Analysis → Deliberation →

  Planning → Execution → Observation → Reflection → Adaptation

  ```


  CEM is intended to orchestrate governed AI cognition, calling RSS for context assembly,
  enforcing DAP for human-in-the-loop decisions, and maintaining audit trails.


  The question arose: Should CEM be implemented early in ste-runtime development,
  or deferred until foundational components are stable?


  ---'
