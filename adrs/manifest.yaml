invariants:
- id: INV-0001
  statement: 'Single repository only: RECON discovers files within the current repository.
    Cross-repository reconciliation is out of scope.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0002
  statement: 'Incremental reconciliation: Only files that have changed since the last
    run are re-extracted (when timestamp detection is available).'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0003
  statement: 'Configurable source directories: Specified via `ste.config.json` or
    auto-detected.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0004
  statement: 'Shallow extraction: Extract structural elements (functions, classes,
    imports, exports) without deep semantic analysis.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0005
  statement: 'No deep semantic analysis: Do not attempt to understand function behavior,
    side effects, or complex type flows.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0006
  statement: 'Multi-language support: TypeScript, Python, CloudFormation, JSON (see
    E-ADR-005), Angular, CSS/SCSS (see E-ADR-006).'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0007
  statement: 'Portable execution: RECON must work when dropped into any project.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0008
  statement: 'Provisional mapping: Normalization to AI-DOC schema is best-effort,
    not canonical.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0009
  statement: 'Schema evolution expected: The AI-DOC schema is still evolving; normalization
    will change.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0010
  statement: 'ID stability: Element IDs should be stable across runs for the same
    source element.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0011
  statement: 'State is authoritative, not historical: Each run produces the current
    truth, not a delta.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0012
  statement: 'Create/Update/Delete semantics: New slices are created, changed slices
    are updated, orphaned slices are deleted.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
- id: INV-0013
  statement: 'Orphan detection: Slices from processed source files that no longer
    exist in code are removed.'
  defined_in: ADR-L-0001
  enforced_by: []
  enforcement_level: must
