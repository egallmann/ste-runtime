context: 'The TypeScript extractor currently processes Angular files as standard TypeScript,
  capturing:

  - Functions and their signatures

  - Classes and their methods

  - Import/export relationships

  - Module structure


  However, Angular-specific semantics are not captured:


  | Pattern | Current Extraction | Semantic Gap |

  |---------|-------------------|--------------|

  | `@Component({ selector: ''app-dashboard'' })` | Class with decorator | Selector,
  templateUrl, styleUrls missing |

  | `@Injectable({ providedIn: ''root'' })` | Class with decorator | Dependency injection
  scope missing |

  | Route definitions | Array of objects | Navigation structure, guards, lazy loading
  missing |

  | HTML templates | Not extracted | Template bindings, component usage, directives
  missing |


  Additionally, CSS/SCSS files contain semantic information valuable for **any** frontend
  project:

  - Design tokens (CSS variables, SCSS variables)

  - Responsive breakpoints

  - Animation definitions

  - Component styling patterns


  **Impact**: Frontend components cannot be linked to:

  - Their templates (component ↔ template relationship)

  - Their styles (component ↔ styles relationship)

  - Backend services they consume (HTTP calls → API endpoints)

  - Other components they render (parent → child relationships)

  - Routes that load them (route → component mapping)


  The question arose: Should RECON extract Angular-specific semantics and CSS/SCSS
  beyond basic TypeScript?


  ---'
