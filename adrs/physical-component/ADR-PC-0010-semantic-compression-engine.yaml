schema_version: '1.0'
adr_type: physical-component
id: ADR-PC-0010
title: Semantic Compression Engine
status: proposed
created_date: '2026-05-22'
authors:
- erik.gallmann
domains:
- workspace
- graph
- projection
tags:
- workspace
- compression
- multi-resolution
- projection
- deterministic
introduces_entities:
- COMP-0011
realizes_entities:
- CAP-0019
implements_system:
- ADR-PS-0001
implements_logical:
- ADR-L-0019
- ADR-L-0018
technologies:
- typescript
- node.js
context: |
  ADR-L-0019 established the capability for multi-resolution architecture
  projection using deterministic semantic compression. This component implements
  the compression engine, resolution-aware renderers, multi-resolution emission
  pipeline, and projection family registry that realize that capability. It
  consumes CannedQueryResult from the existing workspace graph query engine
  (COMP-0010) and produces CompressedProjection at configurable resolution levels.
technology_stack:
- category: language
  name: TypeScript
  version: 5.3+
  rationale: Existing ste-runtime implementation language.
component_specifications:
- id: COMP-0011
  name: Semantic Compression Engine
  type: library
  responsibilities: |
    - Compress CannedQueryResult into CompressedProjection at configurable resolution levels (L0-L4)
    - Group endpoints by capability domain using path-prefix extraction
    - Aggregate same-type nodes above threshold into count-annotated groups
    - Filter edges by 5-tier verb taxonomy with per-level suppression rules
    - Compress edge multiplicity (N edges of same verb collapsed to single edge with count)
    - Suppress alarm/monitoring infrastructure at L0-L1
    - Render compressed projections to Mermaid and table formats with navigation bars
    - Emit multi-resolution projection files (L0-L3) alongside existing L4 files
    - Manage projection family registry for extensible projection types
  generation_context:
    purpose: |
      Deterministic semantic compression layer between canned-query results and
      projection rendering, producing multi-resolution architecture views.
    key_responsibilities:
    - compress(result, config) -> CompressedProjection
    - toMermaidAtResolution(projection) -> string
    - toTableAtResolution(projection) -> Array<Record<string, string>>
    - emitMultiResProjections(outputDir, manifest) -> MultiResEmitResult
    - ProjectionFamily registry (registerFamily, getFamily, getAllFamilies)
    constraints:
    - All compression algorithms are deterministic (same input -> same output)
    - No LLM inference in compression, rendering, or emission
    - L4 output must remain identical to existing toMermaid() output
    - Compression preserves traceability via memberIds and sourceEdgeIds
    success_criteria:
    - L0 produces exactly 1 node per repo
    - L2 groups 61 endpoints into ~12 capability domains
    - L4 backward compatibility (identical to existing toMermaid)
    - Empty graph produces valid minimal projection files
    - Each emitted file has valid YAML frontmatter and navigation bars
    - npm run build && npm test passes with all tests
  interfaces:
  - id: IFACE-0011
    type: library_api
    specification: |
      Programmatic API:
        - compress(result: CannedQueryResult, config: { level: ResolutionLevel } & Partial<ResolutionConfig>): CompressedProjection
        - defaultResolutionConfig(level: ResolutionLevel): ResolutionConfig
        - extractCapabilityDomain(endpointId: string): string | null
        - toMermaidAtResolution(projection: CompressedProjection): string
        - toTableAtResolution(projection: CompressedProjection): Array<Record<string, string>>
        - navigationBar(currentLevel: ResolutionLevel): string
        - emitMultiResProjections(outputDir: string, manifest: WorkspaceManifest): Promise<MultiResEmitResult>
        - registerFamily(family: ProjectionFamily): void
        - getFamily(id: string): ProjectionFamily | undefined
        - getAllFamilies(): ProjectionFamily[]
  implementation_identifiers:
    module_path: src/workspace/compression.ts
    additional_modules:
    - src/workspace/emit-multi-res-projections.ts
    - src/workspace/projection-families.ts
    entry_point: src/workspace/index.ts
    test_path: src/workspace/compression.test.ts
    additional_test_paths:
    - src/workspace/emit-multi-res-projections.test.ts
    - src/workspace/projection-families.test.ts
    - src/workspace/projections.test.ts
  implementation_requirements:
    error_handling:
      strategy: |
        Empty graph input produces valid but minimal CompressedProjection (0 nodes, 0 edges).
        Unknown node types default to standard Mermaid rectangle shape.
        Ungroupable endpoints render individually without capability group wrapper.
    observability:
      logging:
        level: info
        structured: false
      metrics:
      - name: compression_ratio
        type: gauge
      - name: multi_res_emission_duration_ms
        type: histogram
    testing_requirements:
      unit_test_coverage: '>= 80%'
      integration_tests: |
        - Compression tests: L0-L4 against realistic multi-repo fixture, empty graph, edge tier filtering
        - Renderer tests: L0 output <= 30 lines, L2 produces capability subgraphs, L4 backward compat
        - Emission tests: file count, frontmatter schema, navigation bars, empty graph
        - Family tests: registry lookup, file name pattern generation
  implements_capabilities:
  - CAP-0019
  dependencies:
  - COMP-0010
