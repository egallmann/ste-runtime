id: ADR-PC-0001
title: MCP Server and Tool Registry
status: proposed
created_date: '2026-03-15'
authors:
- ste-runtime
domains:
- mcp
- integration
- runtime
implements_system:
- ADR-PS-0001
modified_date: '2026-05-22'
implements_logical:
- ADR-L-0004
- ADR-L-0006
- ADR-L-0007
- ADR-L-0018
technologies:
- typescript
- node.js
- mcp
